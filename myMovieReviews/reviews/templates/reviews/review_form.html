{% load static %}
<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Movie review</title>
  <link rel="stylesheet" href="{% static 'reviews/style.css' %}">

</head>

<body>
  <h1><a href="{% url 'review-list' %}">My Movie reviews</a></h1>
  <hr>
  <h2>Movie review 🍿</h2>

  <form method="POST">
    {% csrf_token %}
    <p>제목: <input type="text" name="title" value="{{ review.title|default:'' }}" required></p>
    <p>개봉년도: <input type="number" name="year" value="{{ review.year|default:'' }}" required></p>
    <p>장르: <select name="genre" required>
        <option value="">--------</option>
        <option value="SF" {% if review.genre == 'SF' %}selected{% endif %}>SF</option>
        <option value="코미디" {% if review.genre == '코미디' %}selected{% endif %}>코미디</option>
        <option value="액션" {% if review.genre == '액션' %}selected{% endif %}>액션</option>
        <option value="드라마" {% if review.genre == '드라마' %}selected{% endif %}>드라마</option>
        <option value="공포" {% if review.genre == '공포' %}selected{% endif %}>공포</option>
        <option value="로맨스" {% if review.genre == '로맨스' %}selected{% endif %}>로맨스 </option>
      </select></p>
    <p>별점: <input type="number" step="0.1" name="rating" value="{{ review.rating|default:'' }}" required></p>
    <p>러닝타임: <input type="number" name="running_time" value="{{ review.running_time|default:'' }}" required></p>
    <p>리뷰:<br><textarea name="content" required>{{ review.content|default:'' }}</textarea></p>
    <p>감독: <input type="text" name="director" value="{{ review.director|default:'' }}" required></p>
    <p>배우: <input type="text" name="actors" value="{{ review.actors|default:'' }}" required></p>
    <button type="submit">Save</button>
  </form>
</body>

</html>
